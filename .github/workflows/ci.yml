# .github/workflows/ci.yml
# GitHub Actions CI pipeline for policy-sop-assistant
# Runs on every push and pull request to main.
#
# Steps:
#   1. Lint with ruff
#   2. Type-check with mypy
#   3. Unit tests with pytest
#   4. (Optional) Integration smoke test against stub engine

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"
  PROJECT_ID: "ci-stub-project"
  DATA_STORE_ID: "policy-docs-stub"
  GEMINI_MODEL: "gemini-2.0-flash-001"
  REQUIRE_AUTH: "false"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt mypy

      - name: Run mypy
        run: mypy api/ qa/ ingestion/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # non-blocking until stubs are complete

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --asyncio-mode=auto \
            --junitxml=test-results/junit.xml
        env:
          PYTHONPATH: .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "No Dockerfile found - skipping build check."
            exit 0
          fi
          docker build -t policy-sop-api:ci-${{ github.sha }} .
          echo "Docker build succeeded."
